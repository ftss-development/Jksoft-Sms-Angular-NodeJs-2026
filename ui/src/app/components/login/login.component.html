
<div class="h-screen w-full bg-[#f0f6fa] flex flex-col font-display overflow-y-auto">
    <!-- Header -->
    <header class="w-full px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-2 text-slate-900">
            <span class="material-symbols-outlined text-primary !text-2xl sm:!text-3xl" style="font-variation-settings: 'FILL' 1;">layers</span>
            <span class="text-lg sm:text-xl font-bold tracking-tight">SecurePortal</span>
        </div>
        <button class="bg-primary text-white text-xs sm:text-sm font-medium px-4 py-2 rounded-lg hover:bg-primary/90 transition-colors shadow-sm">
            Help
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 py-4 sm:py-8">
        <div class="w-full max-w-[420px] sm:max-w-[480px] bg-white rounded-xl shadow-xl shadow-slate-200/60 p-6 sm:p-8">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-slate-900 mb-1.5">Welcome back</h1>
                <p class="text-slate-500 text-sm">Enter your credentials to access your account</p>
            </div>

            @if (errorMessage()) {
                <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm flex items-center gap-2">
                    <span class="material-symbols-outlined !text-[18px]">error</span>
                    {{ errorMessage() }}
                </div>
            }

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
                <!-- Username -->
                <div class="flex flex-col gap-1.5">
                    <label for="username" class="text-sm font-semibold text-slate-900">Username or Email</label>
                    <input type="text" id="username" formControlName="username" 
                           placeholder="Enter your username"
                           class="w-full h-10 sm:h-11 px-4 rounded-lg border border-slate-300 bg-white text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm">
                </div>

                <!-- Password -->
                <div class="flex flex-col gap-1.5">
                    <div class="flex items-center justify-between">
                        <label for="password" class="text-sm font-semibold text-slate-900">Password</label>
                        <a href="#" class="text-xs sm:text-sm font-medium text-primary hover:underline">Forgot Password?</a>
                    </div>
                    <div class="relative">
                        <input [type]="showPassword() ? 'text' : 'password'" id="password" formControlName="password" 
                               placeholder="••••••••"
                               class="w-full h-10 sm:h-11 pl-4 pr-12 rounded-lg border border-slate-300 bg-white text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all tracking-widest text-sm">
                        <button type="button" (click)="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 flex items-center">
                            <span class="material-symbols-outlined !text-[18px] sm:!text-[20px]">{{ showPassword() ? 'visibility' : 'visibility_off' }}</span>
                        </button>
                    </div>
                </div>

                <!-- Submit Button disabled:opacity-70 disabled:cursor-not-allowed-->
                <button type="submit" [disabled]="isSubmitting() || loginForm.invalid" class="w-full h-10 sm:h-11 bg-primary hover:bg-blue-600 text-white font-bold rounded-lg shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2 transition-all mt-4 active:scale-[0.98] text-sm ">
                    @if (isSubmitting()) {
                        <span class="material-symbols-outlined animate-spin !text-[18px]">sync</span>
                        <span>Signing in...</span>
                    } @else {
                        <span>Sign In</span>
                        <span class="material-symbols-outlined !text-[18px] sm:!text-[20px]">login</span>
                    }
                </button>
                
            </form>
        </div>
        
        <div class="mt-6 text-center text-xs text-slate-400 max-w-xs">
            <p>Protected by reCAPTCHA and subject to the Privacy Policy and Terms of Service.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-4 sm:py-6 flex justify-center items-center gap-6 text-[10px] font-bold text-slate-400 tracking-widest uppercase flex-wrap px-4 flex-shrink-0">
        <a href="#" class="hover:text-slate-600 transition-colors">Privacy</a>
        <a href="#" class="hover:text-slate-600 transition-colors">Terms</a>
        <a href="#" class="hover:text-slate-600 transition-colors">Contact</a>
    </footer>
</div>
