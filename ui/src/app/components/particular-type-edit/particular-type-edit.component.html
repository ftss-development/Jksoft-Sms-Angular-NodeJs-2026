
<div class="flex flex-1 flex-col py-8 px-4 md:px-8 lg:px-10 bg-slate-50 dark:bg-background-dark h-full">
  <div class="mx-auto w-full max-w-[800px] flex flex-col gap-6">
    <nav class="flex flex-wrap items-center gap-2 px-1 text-sm">
      <a class="text-slate-500 hover:text-primary transition-colors" routerLink="/dashboard">Home</a>
      <span class="text-slate-400">/</span>
      <a class="text-slate-500 hover:text-primary transition-colors" routerLink="/particular-types">Particular Types</a>
      <span class="text-slate-400">/</span>
      <span class="text-slate-900 font-bold dark:text-white">Edit Type</span>
    </nav>

    <div class="flex flex-col gap-2 pb-2">
      <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Edit Particular Type</h1>
      <p class="text-slate-500 dark:text-slate-400 text-base">Update configuration for {{ pt?.typeName }}.</p>
    </div>

    @if (pt) {
    <form [formGroup]="typeForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
        
        <div class="bg-white dark:bg-[#1a2632] rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm p-8">
             <div class="flex flex-col gap-6">
                 <div>
                    <label class="block text-sm font-bold text-slate-900 dark:text-white mb-2">Type Name</label>
                    <input type="text" formControlName="typeName" class="block w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-[#23303e] text-slate-900 dark:text-white p-3 shadow-sm focus:border-primary focus:ring-primary sm:text-sm"/>
                 </div>
                 
                 <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                     <div>
                        <label class="block text-sm font-bold text-slate-900 dark:text-white mb-2">Category</label>
                        <input type="text" formControlName="category" class="block w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-[#23303e] text-slate-900 dark:text-white p-3 shadow-sm sm:text-sm"/>
                     </div>
                     <div>
                        <label class="block text-sm font-bold text-slate-900 dark:text-white mb-2">Default GL Group</label>
                        <input type="text" formControlName="defaultGlGroup" class="block w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-[#23303e] text-slate-900 dark:text-white p-3 shadow-sm sm:text-sm"/>
                     </div>
                 </div>

                 <div>
                    <label class="block text-sm font-bold text-slate-900 dark:text-white mb-2">Description</label>
                    <textarea formControlName="description" rows="3" class="block w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white dark:bg-[#23303e] text-slate-900 dark:text-white p-3 shadow-sm sm:text-sm"></textarea>
                 </div>

                 <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-lg flex items-center justify-between border border-slate-100 dark:border-slate-700">
                     <div>
                         <span class="block text-sm font-bold text-slate-900 dark:text-white">Active Status</span>
                         <span class="text-xs text-slate-500">Allow this type to be used in transactions.</span>
                     </div>
                     <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" formControlName="isActive" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-primary/20 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                 </div>
             </div>
        </div>

        <div class="flex justify-end gap-3 pt-2">
            <button type="button" (click)="onCancel()" class="px-6 py-2.5 rounded-lg border border-slate-300 bg-white hover:bg-slate-50 text-slate-700 font-bold text-sm transition-colors">Cancel</button>
            <button type="submit" [disabled]="isSubmitting() || typeForm.invalid" class="px-8 py-2.5 rounded-lg bg-primary text-white font-bold text-sm shadow-md hover:bg-blue-600 transition-all flex items-center gap-2 disabled:opacity-50">
                @if(isSubmitting()) {
                    <span class="material-symbols-outlined animate-spin !text-[18px]">sync</span>
                } 
                Save Changes
            </button>
        </div>
    </form>
    } @else {
        <p class="text-center py-10 text-slate-500">Particular Type not found.</p>
    }
  </div>
</div>
